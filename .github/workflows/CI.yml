# Build captcha-plugin Rust binary for the same platforms as the main Go program.
# Platforms: windows/amd64, windows/arm64, linux/amd64, linux/arm64, darwin/arm64

name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            arch: amd64
            os: windows-latest
            ext: .exe
            rust-target: x86_64-pc-windows-msvc
          - platform: windows
            arch: arm64
            os: windows-11-arm
            ext: .exe
            rust-target: aarch64-pc-windows-msvc
          - platform: linux
            arch: amd64
            os: ubuntu-24.04
            ext: ""
            rust-target: x86_64-unknown-linux-gnu
          - platform: linux
            arch: arm64
            os: ubuntu-24.04-arm
            ext: ""
            rust-target: aarch64-unknown-linux-gnu
          - platform: darwin
            arch: arm64
            os: macos-14
            ext: ""
            rust-target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    outputs:
      commit_short: ${{ steps.set_commit.outputs.short }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set commit hash
        id: set_commit
        shell: bash
        run: |
          SHORT="${GITHUB_SHA:0:7}"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.platform }}-${{ matrix.arch }}-cargo-${{ hashFiles('Cargo.toml') }}
          restore-keys: |
            ${{ matrix.platform }}-${{ matrix.arch }}-cargo-

      - name: Build captcha-plugin
        run: |
          cargo build --bin captcha-plugin --release --target ${{ matrix.rust-target }}

      - name: Package artifact
        shell: bash
        run: |
          COMMIT="${{ steps.set_commit.outputs.short }}"
          BIN_NAME="captcha-plugin"
          SOURCE_FILE="target/${{ matrix.rust-target }}/release/${BIN_NAME}${{ matrix.ext }}"
          TARGET_BASE="${BIN_NAME}_${{ matrix.platform }}_${{ matrix.arch }}_${COMMIT}"
          mkdir -p release
          cp "$SOURCE_FILE" "release/${BIN_NAME}${{ matrix.ext }}"
          zip -j "release/${TARGET_BASE}.zip" "release/${BIN_NAME}${{ matrix.ext }}"
          rm -f "release/${BIN_NAME}${{ matrix.ext }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: captcha-plugin-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/*.zip
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set commit hash
        id: set_commit
        shell: bash
        run: |
          SHORT="${GITHUB_SHA:0:7}"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifact tree
        run: |
          find release-assets -type f -name '*.zip' -exec cp {} release-assets/ \;

      - name: Generate checksums
        run: |
          COMMIT="${{ steps.set_commit.outputs.short }}"
          cd release-assets
          sha256sum *.zip > "checksums_${COMMIT}.txt"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          tag_name: "${{ steps.set_commit.outputs.short }}"
          name: "Build ${{ steps.set_commit.outputs.short }}"
          draft: false
          prerelease: false
          files: |
            release-assets/*.zip
            release-assets/checksums_*.txt

      - name: Cleanup old releases (keep latest 10)
        shell: bash
        run: |
          RELEASES=$(gh release list --repo "${{ github.repository }}" --limit 100 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[].tagName')
          COUNT=0
          for TAG in $RELEASES; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 10 ]; then
              echo "Deleting old release: $TAG"
              gh release delete "$TAG" --repo "${{ github.repository }}" --yes --cleanup-tag
            fi
          done
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
